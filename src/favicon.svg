<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Retrogram">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#de6237" />
      <stop offset="1" stop-color="#b8441f" />
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#g)" />
  <!-- Stylized telescope pointing back over its shoulder -->
  <g fill="none" stroke="#ffffff" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round">
    <!-- barrel -->
    <path d="M20 40 L40 22" />
    <path d="M15 45 L23 37 L27 41 L19 49 Z" fill="#ffffff" stroke="none" />
    <path d="M38 18 L46 26 L42 30 L34 22 Z" fill="#ffffff" stroke="none" />
    <!-- tripod -->
    <path d="M31 33 L26 52" />
    <path d="M31 33 L37 52" />
    <!-- retro sparkle / star being observed -->
    <circle cx="48" cy="16" r="2.6" fill="#ffffff" stroke="none" />
  </g>
</svg>
